<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Weather App</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
  transition: background 0.7s, color 0.7s;
}
body.sunny { background: linear-gradient(to right, #f6d365, #fda085); color:black;}
body.rainy { background: linear-gradient(to right, #89f7fe, #66a6ff); color:white;}
body.cloudy { background: linear-gradient(to right, #d7d2cc, #304352); color:white;}
body.snow { background: linear-gradient(to right, #e0eafc, #cfdef3); color:black;}
body.thunderstorm { background: linear-gradient(to right, #373b44, #4286f4); color:white;}
body.light { background:#f0f0f0; color:black;}
.forecast-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 1rem;
}
.fade-in {
  animation: fadeIn 0.7s ease-in;
}
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center transition duration-700">

<button class="toggle-btn absolute top-5 right-5 bg-yellow-300 px-4 py-2 rounded-lg shadow" onclick="toggleMode()">Dark / Light</button>

<div class="bg-white bg-opacity-90 p-8 rounded-2xl shadow-xl w-full max-w-2xl">
  <div class="text-center mb-6">
    <h1 class="text-3xl font-bold mb-2">Advanced Weather App</h1>
    <input type="text" id="cityInput" placeholder="Enter city name" class="p-3 w-2/3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400">
    <button onclick="getWeather()" class="ml-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg">Search</button>
  </div>

  <div id="weatherResult" class="text-center hidden fade-in">
    <h2 id="cityName" class="text-2xl font-semibold"></h2>
    <p id="dateTime" class="text-sm text-gray-600 mb-2"></p>
    <img id="icon" class="mx-auto my-2 w-24">
    <p id="temp" class="text-xl font-bold"></p>
    <p id="feels" class="text-gray-700"></p>
    <p id="minmax" class="text-gray-700"></p>
    <p id="desc" class="capitalize text-gray-600"></p>
    <p id="humidity" class="text-sm text-gray-500"></p>
    <p id="wind" class="text-sm text-gray-500"></p>
  </div>

  <div id="forecast" class="mt-8 hidden fade-in">
    <h3 class="text-xl font-bold mb-2">5-Day Forecast</h3>
    <div id="forecastCards" class="forecast-grid"></div>
  </div>

  <p id="error" class="text-red-600 mt-4 hidden text-center">City not found. Try again.</p>
</div>

<script>
const apiKey = "5ccc586e0e35de4fc5031c0d4bb08b39"; // Replace with your API Key
const body = document.body;

async function getWeather() {
  const city = document.getElementById("cityInput").value;
  if(!city) return;

  const weatherURL = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;
  const forecastURL = `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${apiKey}`;

  try{
    const [weatherRes, forecastRes] = await Promise.all([
      fetch(weatherURL),
      fetch(forecastURL)
    ]);

    if(!weatherRes.ok || !forecastRes.ok) throw new Error();

    const weatherData = await weatherRes.json();
    const forecastData = await forecastRes.json();

    // Show weather
    document.getElementById("weatherResult").classList.remove("hidden");
    document.getElementById("forecast").classList.remove("hidden");
    document.getElementById("error").classList.add("hidden");

    document.getElementById("cityName").textContent = `${weatherData.name}, ${weatherData.sys.country}`;
    const now = new Date();
    document.getElementById("dateTime").textContent = now.toLocaleString();
    document.getElementById("temp").textContent = `Temperature: ${weatherData.main.temp}°C`;
    document.getElementById("feels").textContent = `Feels like: ${weatherData.main.feels_like}°C`;
    document.getElementById("minmax").textContent = `Min: ${weatherData.main.temp_min}°C | Max: ${weatherData.main.temp_max}°C`;
    document.getElementById("desc").textContent = weatherData.weather[0].description;
    document.getElementById("humidity").textContent = `Humidity: ${weatherData.main.humidity}%`;
    document.getElementById("wind").textContent = `Wind: ${weatherData.wind.speed} m/s`;
    document.getElementById("icon").src = `https://openweathermap.org/img/wn/${weatherData.weather[0].icon}@2x.png`;

    updateBackground(weatherData.weather[0].main);

    // 5-day forecast
    const forecastContainer = document.getElementById("forecastCards");
    forecastContainer.innerHTML = "";
    const dailyData = forecastData.list.filter(item => item.dt_txt.includes("12:00:00"));
    dailyData.forEach(day => {
      const card = document.createElement("div");
      card.className = "bg-white p-3 rounded-lg shadow text-center fade-in";
      card.innerHTML = `
        <p class="font-bold">${new Date(day.dt_txt).toDateString().slice(0,10)}</p>
        <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png" class="mx-auto">
        <p>${day.main.temp}°C</p>
        <p class="text-sm text-gray-500">${day.weather[0].description}</p>
      `;
      forecastContainer.appendChild(card);
    });

  } catch(err){
    document.getElementById("error").classList.remove("hidden");
    document.getElementById("weatherResult").classList.add("hidden");
    document.getElementById("forecast").classList.add("hidden");
    body.className = "";
  }
}

function updateBackground(condition){
  body.className = "";
  if(condition.includes("Rain")) body.classList.add("rainy");
  else if(condition.includes("Cloud")) body.classList.add("cloudy");
  else if(condition.includes("Snow")) body.classList.add("snow");
  else if(condition.includes("Thunder")) body.classList.add("thunderstorm");
  else body.classList.add("sunny");
}

// Dark / Light toggle
function toggleMode(){
  body.classList.toggle("light");
}
</script>

</body>
</html>
